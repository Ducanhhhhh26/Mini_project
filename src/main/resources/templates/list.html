<!doctype html>
<html lang="en">
<head>
    <title th:text="#{app.title}">Todo List</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <div class="text-right mb-2">
        <a href="?lang=vi">Tiếng Việt</a> | <a href="?lang=en">English</a>
    </div>

    <div th:if="${message}" class="alert alert-success mt-3" th:text="${message}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0" th:text="#{list.owner(${ownerName})}">Todo App</h2>
        <a class="btn btn-primary" th:href="@{/form}" th:text="#{list.add}">Thêm công việc</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="mb-3" th:text="#{app.title}">Danh sách công việc</h5>
            <table class="table table-bordered">
                <thead class="thead-dark">
                <tr>
                    <th th:text="#{list.id}">ID</th>
                    <th th:text="#{list.content}">Nội dung</th>
                    <th th:text="#{list.due}">Hạn</th>
                    <th th:text="#{list.status}">Trạng thái</th>
                    <th th:text="#{list.priority}">Ưu tiên</th>
                    <th th:text="#{list.action}">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(todos)}">
                    <td colspan="6" class="text-center text-muted" th:text="#{list.no.task}">Chưa có công việc nào</td>
                </tr>
                <tr th:each="t : ${todos}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.content}"></td>
                    <td th:text="${t.dueDate}"></td>
                    <td>
                        <span th:if="${t.status == 'PENDING'}">PENDING</span>
                        <span th:if="${t.status == 'DONE'}">DONE</span>
                    </td>
                    <td>
                        <span th:if="${t.priority == 'LOW'}">LOW</span>
                        <span th:if="${t.priority == 'MEDIUM'}">MEDIUM</span>
                        <span th:if="${t.priority == 'HIGH'}">HIGH</span>
                    </td>
                    <td>
                        <a th:href="@{/edit/{id}(id=${t.id})}" class="btn btn-warning btn-sm" th:text="#{list.edit}">Sửa</a>
                        <a th:href="@{/delete/{id}(id=${t.id})}" class="btn btn-danger btn-sm"
                           th:attr="onclick='return confirm(\'' + #{list.delete.confirm} + '\');'" th:text="#{list.delete}">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
