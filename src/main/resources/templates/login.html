<!doctype html>
<html lang="en">
<head>
    <title th:text="#{app.title}">Todo Login</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4" th:text="#{login.title}">Nhập tên</h3>
                    <form th:action="@{/login}" method="post">
                        <div class="form-group">
                            <label for="username" th:text="#{login.name}">Tên của bạn</label>
                            <input type="text" id="username" name="username" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" th:text="#{login.submit}">Bắt đầu</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="?lang=vi">Tiếng Việt</a> | <a href="?lang=en">English</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
